<!DOCTYPE html>
<html>
<head>
    <title>Register | VITSConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="auth-container1">

    <div class="auth-card1">

        <h2 class="auth-title1">Create Account</h2>

        <form>

            <div class="input-group1">
                <label>Full Name</label>
                <input type="text" class="input1" placeholder="Enter your full name" required>
            </div>

            <div class="input-group1">
                <label>Student Number</label>
                <input type="text" class="input1" placeholder="Enter your student number" required>
            </div>

            <div class="input-group1">
                <label>Password</label>
                <input type="password" class="input1" placeholder="Enter password" required>
            </div>

            <div class="input-group1">
                <label>Confirm Password</label>
                <input type="password" class="input1" placeholder="Confirm password" required>
            </div>

            <button type="submit" class="btn-submit1">Register</button>

        </form>

        <p class="auth-bottom1">
            Already have an account?
            <a href="login.html">Log-in</a>
        </p>

    </div>

</div>

<footer class="footer1">
  <div class="footer-top1">
    <span class="footer-line1"></span>
    <h2 class="footer-title1">VITS Connect</h2>
    <span class="footer-line1"></span>
  </div>

  <div class="footer-links1">
    <a href="index.html" class="footer-link1">Home</a>
    <a href="events.html" class="footer-link1">Events</a>
    <a href="login.html" class="footer-link1">Login</a>
  </div>

  <div class="footer-bottom1">
    <p class="footer-left1">© 2026 VITS Connect. All Rights Reserved.</p>
    <a href="#top1" class="footer-right1">Back-to-Top</a>
  </div>
</footer>

</body>
</html>
