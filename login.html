<!DOCTYPE html>
<html>
<head>
  <title>Login | VITSConnect</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="auth-container1" id="top1">
  <div class="auth-card1">
    <h2 class="auth-title1">Member Login</h2>

    <form class="auth-form1">
      <div class="input-group1">
        <label class="label1">Student Number</label>
        <input type="text" class="input1" placeholder="Enter your student number" required>
      </div>

      <div class="input-group1">
        <label class="label1">Password</label>
        <input type="password" class="input1" placeholder="Enter your password" required>
      </div>

      <div class="remember-row1">
        <label class="remember-label1">
          <input type="checkbox" class="checkbox1">
          Remember me
        </label>
      </div>

      <button type="submit" class="btn-submit1">Log-in</button>
    </form>

    <p class="auth-bottom1">
      Don't have an account yet?
      <a href="register.html" class="link1">Register</a>
    </p>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer1">
  <div class="footer-top1">
    <span class="footer-line1"></span>
    <h2 class="footer-title1">VITS Connect</h2>
    <span class="footer-line1"></span>
  </div>
  <br>

  <div class="footer-links1">
    <a href="events.html" class="footer-link1">Events</a>
  </div>

  <div class="footer-bottom1">
    <p class="footer-left1">© 2026 VITS Connect. All Rights Reserved.</p>
    <a href="#top1" class="footer-right1">Back-to-Top</a>
  </div>
</footer>

</body>
</html>
